<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Display</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-primary: #2d3748;
            --text-muted: #718096;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .viewer-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px 60px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04), 0 4px 4px 0 rgba(255, 255, 255, 0.5) inset;
            width: 80%;
            max-width: 450px;
        }

        .label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .number {
            font-size: 9rem;
            font-weight: 200;
            letter-spacing: -2px;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .status {
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
            word-break: break-all;
        }

        .room-tag {
            font-weight: bold;
            color: #4a5568;
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 8px;
            border-radius: 6px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>

<body>

    <div class="viewer-card">
        <div class="label">Now Serving</div>
        <div id="number-display" class="number">001</div>
        <div id="status" class="status">Initializing Display Engine...</div>
    </div>

    <script>
        const display = document.getElementById('number-display');
        const statusDiv = document.getElementById('status');

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } function playDingDong() {
            initAudio();
            if (!audioCtx) return;

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const now = audioCtx.currentTime;

            // Helper to create a warm tone with a gentle attention-grabbing warble
            function createProjectorTone(freq, startTime, duration, masterGain) {
                const osc = audioCtx.createOscillator();
                const lfo = audioCtx.createOscillator();
                const lfoGain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);

                // Low-Frequency Oscillator (LFO) creates a subtle vibrato (warble)
                // This cuts through ambient noise perfectly without needing high volume
                lfo.frequency.setValueAtTime(6, startTime); // 6 Hz warble speed
                lfoGain.gain.setValueAtTime(7, startTime);  // Pitch deviation amount

                lfo.connect(lfoGain);
                lfoGain.connect(osc.frequency);
                osc.connect(masterGain);

                lfo.start(startTime);
                osc.start(startTime);

                lfo.stop(startTime + duration);
                osc.stop(startTime + duration);
            }

            // ==========================================
            // 1. THE "DING" CHORD (Optimized for Projector Mids)
            // ==========================================
            const dingMaster = audioCtx.createGain();
            dingMaster.gain.setValueAtTime(0.75, now); // Moderate volume
            dingMaster.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
            dingMaster.connect(audioCtx.destination);

            // Warm base tone (A5) paired with a high crisp octave chime (A6)
            createProjectorTone(880.00, now, 1.4, dingMaster);
            createProjectorTone(1760.00, now, 1.0, dingMaster);

            // ==========================================
            // 2. THE "DONG" CHORD (Delayed by 400ms)
            // ==========================================
            const dongTime = now + 0.40;
            const dongMaster = audioCtx.createGain();
            dongMaster.gain.setValueAtTime(0, now);
            dongMaster.gain.setValueAtTime(0.75, dongTime);
            dongMaster.gain.exponentialRampToValueAtTime(0.001, dongTime + 1.8);
            dongMaster.connect(audioCtx.destination);

            // Resolves downward cleanly (F5 and F6)
            createProjectorTone(698.46, dongTime, 1.8, dongMaster);
            createProjectorTone(1396.91, dongTime, 1.4, dongMaster);
        }
        // Setup P2P Listener using your room name
        const roomName = '4b_yhpd1306';
        const peer = new Peer(roomName);

        peer.on('open', (id) => {
            statusDiv.innerHTML = `Display active. Click screen to enable sound.<br>Room Key: <span class="room-tag">${id}</span>`;
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                statusDiv.textContent = "Room ID busy. Is another viewer open?";
            } else {
                statusDiv.textContent = "Connection error. Retrying...";
            }
        });

        // Listen for direct incoming connection from phone dialer
        peer.on('connection', (conn) => {
            statusDiv.textContent = "Controller phone linked directly.";

            conn.on('data', (data) => {
                if (data && typeof data.value !== 'undefined') {
                    display.textContent = String(data.value).padStart(3, '0');
                    playDingDong();
                }
            });

            conn.on('close', () => {
                statusDiv.innerHTML = `Controller split. Awaiting re-link...<br>Room Key: <span class="room-tag">${roomName}</span>`;
            });
        });

        window.addEventListener('click', () => {
            initAudio();
        });
    </script>
</body>

</html>
